<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFFINEX AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0; background: #121212;">

    <model-viewer 
        src="models/3DModel.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate 
        style="width: 100%; height: 100vh; background-color: #1a1a1a;">
        
        <button slot="ar-button" style="background: #d4af37; border-radius: 50px; border: none; padding: 15px 30px; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-weight: bold; cursor: pointer; color: black;">
            🍽️ VIEW ON YOUR TABLE
        </button>

    </model-viewer>

</body>
</html>
