<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AFFINEX | AR MENU</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { --red: #ff0000; --black: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        
        body { background: var(--black); color: white; height: 100vh; overflow: hidden; }

        /* Premium Header */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px; text-align: center;
        }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 5px; color: var(--red); text-shadow: 0 0 10px var(--red); }

        /* Search Bar */
        .search-box { margin-top: 15px; width: 100%; display: flex; justify-content: center; }
        .search-input {
            width: 80%; padding: 10px 20px; border-radius: 50px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--red);
            color: white; outline: none; backdrop-filter: blur(5px);
        }

        /* 3D Viewer Area */
        model-viewer {
            width: 100%; height: 100vh;
            background-color: var(--black);
            --poster-color: transparent;
        }

        /* 🔥 ORIGINAL AR BUTTON (This opens the camera) */
        #ar-button {
            background-color: var(--red);
            border-radius: 50px;
            border: none;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 35px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px var(--red);
            z-index: 999;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* Info Overlay */
        .info-card {
            position: absolute; bottom: 120px; width: 100%;
            text-align: center; pointer-events: none;
        }
        .price { color: var(--red); font-size: 1.8rem; font-weight: 900; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AFFINEX</div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Search dish..." id="searchBar">
        </div>
    </header>

    <model-viewer 
        src="3DModel.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="2"
        environment-image="neutral"
        ar-placement="floor">
        
        <button slot="ar-button" id="ar-button">
            <span>📷</span> VIEW IN YOUR ROOM
        </button>

        <div class="info-card">
            <h2 id="dishName">Premium Tissue Box</h2>
            <div class="price">Rs. 250</div>
        </div>

    </model-viewer>

    <script>
        // Simple Working Search
        document.getElementById('searchBar').addEventListener('keyup', (e) => {
            let val = e.target.value.toLowerCase();
            let nameTag = document.getElementById('dishName');
            if(val.includes('tissue')) {
                nameTag.innerText = "Premium Tissue Box";
                nameTag.style.color = "red";
            } else if(val === "") {
                nameTag.innerText = "Premium Tissue Box";
                nameTag.style.color = "white";
            } else {
                nameTag.innerText = "Item Not Found";
            }
        });
    </script>

</body>
</html>
