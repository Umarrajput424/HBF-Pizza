<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFFINEX | AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { --primary-red: #d32f2f; --primary-red-dark: #b71c1c; --dark-bg: #121212; --card-bg: #1e1e1e; --text-white: #ffffff; --text-gray: #aaaaaa; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: var(--text-white); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background-color: #000000; padding: 20px 15px; text-align: center; border-bottom: 2px solid var(--primary-red); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary-red); letter-spacing: 2px; margin-bottom: 15px; }

        /* Search Bar Styles */
        .search-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        .search-bar { width: 100%; padding: 12px 15px 12px 45px; background-color: var(--card-bg); border: 1px solid #333; border-radius: 50px; color: var(--text-white); font-size: 14px; box-sizing: border-box; transition: 0.3s; }
        .search-bar:focus { outline: none; border-color: var(--primary-red); box-shadow: 0 0 10px rgba(211, 47, 47, 0.4); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #555; }
        .close-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #555; cursor: pointer; visibility: hidden; }

        /* AR Viewer Area */
        .viewer-box { width: 100%; flex-grow: 1; position: relative; background: #000000; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* AR Button (Centralized and Elite) */
        #ar-button {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary-red); color: white; border: none; padding: 15px 35px;
            border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 8px 30px rgba(211, 47, 47, 0.6);
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        #ar-button:hover { background: var(--primary-red-dark); box-shadow: 0 10px 40px rgba(211, 47, 47, 0.8); }

        /* Bottom Details */
        .details { background-color: #000000; padding: 25px 20px; text-align: center; border-top: 1px solid #333; }
        .price { color: var(--primary-red); font-size: 1.5rem; margin-top: 10px; font-weight: bold; }
        .menu-title { margin: 0; font-weight: 800; font-size: 1.5rem; color: var(--text-white); text-transform: uppercase; letter-spacing: 1px; }

        footer { text-align: center; padding: 15px; background: #000; color: #444; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AFFINEX</div>
        <div class="search-container">
            <span class="search-icon">&#128269;</span>
            <input type="text" id="search-bar" class="search-bar" placeholder="Search dish (e.g. tissue box)..." onkeyup="searchModel()">
            <span id="close-icon" class="close-icon" onclick="clearSearch()">&#10006;</span>
        </div>
    </header>

    <div class="viewer-box">
        <model-viewer 
            id="dish-viewer"
            src="3DModel.glb" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            shadow-intensity="2" 
            environment-image="neutral"
            auto-rotate>
            
            <button slot="ar-button" id="ar-button">
                <span>🍽️</span> VIEW ON YOUR TABLE
            </button>
        </model-viewer>
    </div>

    <div class="details">
        <h2 id="dish-name" class="menu-title">Premium Tissue Box</h2>
        <div class="price">Rs. 250</div>
    </div>

    <footer>
        POWERED BY AFFINEX DIGITAL SOLUTIONS
    </footer>

    <script>
        const viewer = document.getElementById('dish-viewer');
        const dishName = document.getElementById('dish-name');
        const searchInput = document.getElementById('search-bar');
        const closeIcon = document.getElementById('close-icon');

        function searchModel() {
            const query = searchInput.value.toLowerCase().trim();
            
            // Show close icon if user typing
            if (query.length > 0) {
                closeIcon.style.visibility = 'visible';
            } else {
                closeIcon.style.visibility = 'hidden';
            }

            // Simple search logic for now
            if (query === 'tissue box') {
                loadModel('3DModel.glb', 'Premium Tissue Box', '250');
            } else if (query === 'burger') {
                // Future Placeholder
                alert('We are working on adding Burger model!');
            } else {
                // If nothing matches, keep current model
                dishName.innerText = "Premium Tissue Box";
            }
        }

        function clearSearch() {
            searchInput.value = '';
            closeIcon.style.visibility = 'hidden';
            // Reset to default
            loadModel('3DModel.glb', 'Premium Tissue Box', '250');
        }

        function loadModel(path, name, price) {
            // Only update if path is different
            if (viewer.src !== path) {
                viewer.src = path;
                dishName.innerText = name;
                document.querySelector('.price').innerText = `Rs. ${price}`;
                searchInput.blur(); // Hide keyboard
            }
        }

        // Test on mobile for AR button!
    </script>

</body>
</html>
