<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFFINEX AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #121212; font-family: sans-serif; }
        .viewer-container { width: 100%; height: 100vh; display: flex; flex-direction: column; }
        model-viewer { width: 100%; flex-grow: 1; background-color: #1a1a1a; }
        
        #ar-button {
            background: #d4af37; border-radius: 50px; border: none; padding: 15px 30px;
            color: black; font-weight: bold; position: absolute; bottom: 30px;
            left: 50%; transform: translateX(-50%); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            src="3DModel.glb" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            shadow-intensity="1" 
            auto-rotate>
            
            <button slot="ar-button" id="ar-button">
                🍽️ VIEW ON YOUR TABLE (AR)
            </button>
        </model-viewer>
    </div>

</body>
</html>
