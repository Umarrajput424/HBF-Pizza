<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFFINEX | Interactive AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card: #1e1e1e; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark); color: white; }
        
        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--gold); letter-spacing: 2px; }
        
        /* Main AR Display */
        .ar-display { width: 100%; height: 50vh; background: radial-gradient(circle, #222 0%, #121212 100%); position: relative; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* Custom AR Button */
        #ar-button {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: black; border: none; padding: 12px 25px;
            border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* Menu Grid */
        .menu-container { padding: 25px 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { 
            background: var(--card); border-radius: 15px; padding: 15px; text-align: center;
            border: 1px solid #333; transition: 0.2s;
        }
        .item-card:active { transform: scale(0.95); border-color: var(--gold); }
        .icon { font-size: 30px; margin-bottom: 8px; display: block; }
        .name { font-size: 0.9rem; font-weight: 600; display: block; }
        .price { color: var(--gold); font-size: 0.8rem; margin-top: 5px; display: block; }

        footer { text-align: center; padding: 30px; color: #555; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AFFINEX</div>
        <div style="color: #888; font-size: 0.7rem;">SELECT A DISH TO VIEW IN AR</div>
    </header>

    <div class="ar-display">
        <model-viewer id="main-viewer" 
            src="models/3DModel.glb" 
            ar ar-modes="webxr scene-viewer quick-look" 
            camera-controls shadow-intensity="1.5" environment-image="neutral" auto-rotate>
            <button slot="ar-button" id="ar-button">VIEW ON YOUR TABLE 🍽️</button>
        </model-viewer>
    </div>

    <div class="menu-container">
        <div class="grid">
            <div class="item-card" onclick="updateModel('models/3DModel.glb', 'Premium Tissues')">
                <span class="icon">📦</span>
                <span class="name">Premium Tissue</span>
                <span class="price">Rs. 250</span>
            </div>

            <div class="item-card" onclick="updateModel('models/burger.glb', 'Elite Burger')">
                <span class="icon">🍔</span>
                <span class="name">Zinger Burger</span>
                <span class="price">Rs. 550</span>
            </div>
            
            <div class="item-card" onclick="updateModel('models/pizza.glb', 'Golden Pizza')">
                <span class="icon">🍕</span>
                <span class="name">Cheese Pizza</span>
                <span class="price">Rs. 1200</span>
            </div>
        </div>
    </div>

    <footer>
        POWERED BY AFFINEX DIGITAL SOLUTIONS
    </footer>

    <script>
        function updateModel(path, name) {
            const viewer = document.querySelector('#main-viewer');
            viewer.src = path;
            // Page automatically scrolls up to show the new model
            window.scrollTo({ top: 100, behavior: 'smooth' });
        }
    </script>

</body>
</html>
