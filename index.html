<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AFFINEX | Extreme Mobile AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --primary-red: #ff0000; 
            --bg-black: #000000;
            --glass: rgba(255, 255, 255, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-black); color: white; 
            height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif;
        }

        /* Top Search & Logo Area */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px; text-align: center;
        }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 5px; color: var(--primary-red); margin-bottom: 15px; }
        
        .search-container {
            width: 100%; max-width: 400px; margin: 0 auto; position: relative;
        }
        .search-bar {
            width: 100%; padding: 12px 20px; border-radius: 50px;
            background: var(--glass); border: 1px solid rgba(255,0,0,0.3);
            color: white; outline: none; backdrop-filter: blur(10px);
        }

        /* 3D Viewer Area */
        .viewer-wrap { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* Floating Info Card */
        .info-card {
            position: absolute; bottom: 30px; left: 5%; width: 90%;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px);
            border-radius: 25px; padding: 25px; border: 1px solid rgba(255,0,0,0.2);
            text-align: center; z-index: 10;
        }
        .title { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .price { color: var(--primary-red); font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }

        /* 🔥 Extreme AR Button */
        #ar-button {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--primary-red); color: white; font-weight: 900;
            font-size: 1.1rem; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        /* Mobile Specific: AR Button Animation */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        #ar-button { animation: pulse 2s infinite ease-in-out; }

    </style>
</head>
<body>

    <header>
        <div class="logo">AFFINEX</div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="SEARCH DISH...">
        </div>
    </header>

    <div class="viewer-wrap">
        <model-viewer 
            id="ar-viewer"
            src="3DModel.glb" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            ar-scale="auto"
            ar-placement="floor"
            camera-controls 
            touch-action="pan-y"
            shadow-intensity="2" 
            exposure="1"
            auto-rotate>
            
            <button slot="ar-button" id="ar-button">
                🚀 OPEN CAMERA (AR)
            </button>
        </model-viewer>
    </div>

    <div class="info-card">
        <h2 class="title">Premium Tissue Box</h2>
        <div class="price">Rs. 250</div>
        <p style="color: #666; font-size: 0.8rem;">Click the button to place this item on your table.</p>
    </div>

</body>
</html>
